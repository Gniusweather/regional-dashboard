name = "rwc-weather-push"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# KV namespace that stores push subscriptions + per-station alert config.
# The deploy workflow injects the real id; locally, `wrangler kv namespace
# create PUSH_KV` and paste the id below.
# NOTE: must stay ABOVE any [section] header — in TOML a bare key after a
# header belongs to that section, and wrangler then silently skips the binding.
kv_namespaces = [
  { binding = "PUSH_KV", id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID" }
]

# Cron Trigger — checks METAR and sends Web Push independently of whether
# anyone has the dashboard open. Every 5 minutes.
[triggers]
crons = ["*/5 * * * *"]

[vars]
# Restrict who can call /subscribe /unsubscribe. Set to your GitHub Pages
# origin (no trailing slash) once you know it. "*" while testing.
ALLOWED_ORIGIN = "*"

# Required by the Web Push protocol (RFC 8292) — any contact URI/mailto is fine,
# push services use it only if they need to reach you about your usage.
VAPID_SUBJECT = "mailto:gmarugg21@hotmail.com"

# Public half of the VAPID key pair — safe to publish, the client needs this too.
VAPID_PUBLIC_KEY = "BGOkKu9MNuP_Uy6E10xBuCAEl6FvVUPItyOBYQtr3Z-K4f6XgrguTGfzAo31GC_XknhIjdOpI1Kd6HQctCMXJ2s"

# ntfy topic — the SIMPLE push channel. If set, the cron also publishes alerts
# here; subscribe to this topic in the ntfy app (server ntfy.sh) on your phone.
# With ntfy you can skip the VAPID/Web-Push setup entirely.
NTFY_TOPIC = "rwc-abc-wx-4f49205af5"

# VAPID_PRIVATE_KEY_JWK and SHARED_SECRET are SECRETS — do not put them here.
# Set them with `wrangler secret put VAPID_PRIVATE_KEY_JWK` (see README.md).
